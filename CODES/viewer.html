<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D OBJ Viewer - TechAssist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            color: #eee;
            display: flex;
            flex-direction: column;

            padding: 16px;
        }
        .main-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 900px;
        }
        .main-tabs .tab-btn {
            flex: 1;
            padding: 12px 20px;
            text-align: center;
            text-decoration: none;
            color: #888;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .main-tabs .tab-btn:hover {
            background: rgba(255, 255, 255, 0.12);

        }
        .main-tabs .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }
        .viewer-wrapper {
            width: 100%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 700px;
        }
        .viewer-header {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .viewer-header h2 {
            font-size: 18px;
            margin-right: auto;
        }
        .file-input-wrap {
            position: relative;
        }
        .file-input-wrap input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;

        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline {
            background: transparent;
            color: #aaa;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .btn-outline:hover { border-color: #667eea; color: #fff; }
        .btn-outline.active {
            border-color: #667eea;

            background: rgba(102, 126, 234, 0.15);

        .shading-group {
            display: flex;

            flex: 1;

        }

            width: 100%;
            height: 100%;

        }
        .info-panel {

        }
        .info-panel h3 {
            font-size: 12px;

            color: #888;
            margin-bottom: 10px;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .info-item .label { color: #888; font-size: 11px; margin-bottom: 4px; }
        .info-item .value { color: #fff; font-weight: 600; word-break: break-all; }
        .placeholder-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #555;
            text-align: center;
            pointer-events: none;
        }
        .placeholder-msg.hidden { display: none; }
    </style>
</head>
<body>
    <nav class="main-tabs">
        <a href="index.php" class="tab-btn">💬 Chatbot</a>
        <a href="viewer.html" class="tab-btn active">📦 3D OBJ Viewer</a>
    </nav>

    <div class="viewer-wrapper">
        <div class="viewer-header">
            <h2>📦 3D OBJ Viewer</h2>
            <div class="file-input-wrap">
                <input type="file" id="fileInput" accept=".obj" />
                <button type="button" class="btn btn-primary">Load OBJ File</button>
            </div>
            <div class="shading-group">
                <label>Shading:</label>
                <button type="button" class="btn btn-outline" data-mode="solid">Solid</button>
                <button type="button" class="btn btn-outline" data-mode="wireframe">Wireframe</button>
                <button type="button" class="btn btn-outline active" data-mode="both">Both</button>
            </div>
        </div>

        <div class="canvas-container">
            <div id="placeholder" class="placeholder-msg">Load an OBJ file to view the 3D model.<br><small>Use .obj format</small></div>
            <canvas id="canvas3d"></canvas>
        </div>

        <div class="info-panel">
            <h3>Object Information</h3>
            <div class="info-grid">
                <div class="info-item">
                    <div class="label">File name</div>
                    <div class="value" id="info-filename">—</div>
                </div>
                <div class="info-item">
                    <div class="label">Vertices</div>
                    <div class="value" id="info-vertices">—</div>
                </div>
                <div class="info-item">
                    <div class="label">Faces</div>
                    <div class="value" id="info-faces">—</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        const canvas = document.getElementById('canvas3d');
        const placeholder = document.getElementById('placeholder');
        const fileInput = document.getElementById('fileInput');
        const infoFilename = document.getElementById('info-filename');
        const infoVertices = document.getElementById('info-vertices');
        const infoFaces = document.getElementById('info-faces');

        let scene, camera, renderer, controls, currentMesh = null, wireframeOverlay = null;
        let shadingMode = 'both';

        function initScene() {
            const width = canvas.parentElement.clientWidth;
            const height = canvas.parentElement.clientHeight;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d0d12);

            camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
            camera.position.set(3, 2, 5);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(5, 10, 7);
            dir.castShadow = true;
            scene.add(dir);
            const fill = new THREE.DirectionalLight(0x8899ff, 0.3);
            fill.position.set(-5, 5, -5);
            scene.add(fill);

            window.addEventListener('resize', onResize);
        }

        function onResize() {
            const container = canvas.parentElement;
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }

        function applyShading(mesh) {
            if (!mesh) return;
            mesh.traverse(function(child) {
                if (child.isMesh && child.material) {
                    child.material.wireframe = (shadingMode === 'wireframe');
                }
            });
            if (wireframeOverlay) {
                scene.remove(wireframeOverlay);
                wireframeOverlay = null;
            }
            if (shadingMode === 'both') {
                wireframeOverlay = new THREE.Group();
                mesh.traverse(function(child) {
                    if (child.isMesh && child.geometry) {
                        const edges = new THREE.EdgesGeometry(child.geometry, 15);
                        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x111111 }));
                        line.position.copy(child.position);
                        line.quaternion.copy(child.quaternion);
                        line.scale.copy(child.scale);
                        wireframeOverlay.add(line);
                    }
                });
                wireframeOverlay.position.copy(mesh.position);
                wireframeOverlay.quaternion.copy(mesh.quaternion);
                wireframeOverlay.scale.copy(mesh.scale);
                scene.add(wireframeOverlay);
            }
        }

        function computeStats(mesh) {
            let vertices = 0, faces = 0;
            mesh.traverse(function(child) {
                if (child.isMesh && child.geometry) {
                    const g = child.geometry;
                    if (g.attributes.position) vertices += g.attributes.position.count;
                    if (g.index) faces += g.index.count / 3;
                    else if (g.attributes.position) faces += Math.floor(g.attributes.position.count / 3);
                }
            });
            return { vertices, faces };
        }

        function centerAndScale(mesh) {
            const box = new THREE.Box3().setFromObject(mesh);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2 / Math.max(maxDim, 0.001);
            mesh.position.sub(center);
            mesh.scale.multiplyScalar(scale);
        }

        const DEFAULT_OBJ_PATH = 'OBJ/3DModel.obj';

        function parseAndShowOBJ(contents, filename) {
            const loader = new OBJLoader();
            const obj = loader.parse(contents);

            if (currentMesh) scene.remove(currentMesh);
            if (wireframeOverlay) { scene.remove(wireframeOverlay); wireframeOverlay = null; }
            currentMesh = obj;

            const material = new THREE.MeshPhongMaterial({
                color: 0x667eea,
                shininess: 60,
                specular: 0x444444,
                side: THREE.DoubleSide
            });
            obj.traverse(function(child) {
                if (child.isMesh) child.material = material;
            });

            centerAndScale(obj);
            applyShading(obj);
            scene.add(obj);

            const stats = computeStats(obj);
            infoFilename.textContent = filename;
            infoVertices.textContent = stats.vertices.toLocaleString();
            infoFaces.textContent = stats.faces.toLocaleString();

            placeholder.classList.add('hidden');
        }

        function loadDefaultModel() {
            placeholder.classList.remove('hidden');
            placeholder.textContent = 'Loading 3DModel.obj...';
            fetch(DEFAULT_OBJ_PATH)
                .then(function(res) {
                    if (!res.ok) throw new Error('Failed to load OBJ');
                    return res.text();
                })
                .then(function(contents) {
                    parseAndShowOBJ(contents, '3DModel.obj');
                })
                .catch(function(err) {
                    placeholder.textContent = 'Load an OBJ file to view the 3D model.\n(Default: OBJ/3DModel.obj could not be loaded.)';
                    console.warn('Default model load failed:', err);
                });
        }

        function loadOBJ(file) {
            const name = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                parseAndShowOBJ(e.target.result, name);
            };
            reader.readAsText(file);
        }

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file && file.name.toLowerCase().endsWith('.obj')) loadOBJ(file);
            this.value = '';
        });

        document.querySelectorAll('.shading-group [data-mode]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.shading-group [data-mode]').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                shadingMode = this.getAttribute('data-mode');
                if (currentMesh) applyShading(currentMesh);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        initScene();
        loadDefaultModel();
        animate();
    </script>
</body>
</html>
